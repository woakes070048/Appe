name: CI

on:
  push:
    branches: [ master ]
  pull_request:

concurrency:
  group: master-appe-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Server

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:6
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Enable Corepack
        run: corepack enable

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libopenblas-dev \
            liblapack-dev \
            libx11-dev \
            libgtk-3-dev \
            default-mysql-client

      - name: Wait for MariaDB
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; do
            echo "Waiting for MariaDB..."
            sleep 5
          done

      - name: Setup Bench
        run: |
          pip install frappe-bench==5.22.6
          bench init \
            --skip-redis-config-generation \
            --skip-assets \
            --python "$(which python)" \
            ~/frappe-bench

          mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL character_set_server = 'utf8mb4';"
          mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci';"

      - name: Install App
        working-directory: /home/runner/frappe-bench
        env:
          CI: "Yes"
        run: |
          bench get-app appe $GITHUB_WORKSPACE
          bench setup requirements --dev
          bench new-site test_site \
            --db-root-password root \
            --admin-password admin
          bench --site test_site install-app appe
          bench build

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app appe
